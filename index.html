<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>StockSense AI — Bhavana Suryan</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e;
    --blue: #58a6ff; --green: #3fb950; --red: #f85149; --orange: #f0883e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Space Grotesk', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    border-bottom: 1px solid var(--border);
    padding: 18px 40px;
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface);
  }
  header h1 { font-size: 1.4rem; font-weight: 700; color: var(--blue); }
  header span { font-size: 0.8rem; color: var(--muted); font-family: 'JetBrains Mono', monospace; }

  .container { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }

  .search-bar {
    display: flex; gap: 12px; margin-bottom: 32px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 20px;
  }
  .search-bar input, .search-bar select {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); padding: 10px 14px; border-radius: 8px;
    font-family: inherit; font-size: 0.95rem;
  }
  .search-bar button {
    background: var(--blue); color: #000;
    border: none; padding: 10px 24px; border-radius: 8px;
    font-weight: 700; font-family: inherit; cursor: pointer;
    font-size: 0.95rem; transition: opacity 0.2s;
  }
  .search-bar button:hover { opacity: 0.85; }

  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .metric-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px; text-align: center;
  }
  .metric-card .value { font-size: 1.6rem; font-weight: 700; color: var(--blue); font-family: 'JetBrains Mono', monospace; }
  .metric-card .label { font-size: 0.78rem; color: var(--muted); margin-top: 4px; }
  .metric-card.up .value { color: var(--green); }
  .metric-card.down .value { color: var(--red); }

  .chart-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 24px; margin-bottom: 24px;
  }
  .chart-card h3 { margin-bottom: 16px; font-size: 1rem; color: var(--muted); font-weight: 500; }
  canvas { max-height: 320px; }

  .tag {
    display: inline-block; background: rgba(88,166,255,0.12);
    color: var(--blue); border: 1px solid rgba(88,166,255,0.3);
    padding: 2px 10px; border-radius: 20px; font-size: 0.75rem;
    font-family: 'JetBrains Mono', monospace; margin-left: 8px;
  }

  .spinner { display: none; text-align: center; padding: 40px; color: var(--muted); }
  .spinner.active { display: block; }

  footer { text-align: center; padding: 32px; color: var(--muted); font-size: 0.8rem; border-top: 1px solid var(--border); }
  .quick-tickers { display: flex; gap: 8px; flex-wrap: wrap; }
  .quick-tickers button {
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); padding: 6px 14px; border-radius: 6px;
    cursor: pointer; font-size: 0.82rem; font-family: 'JetBrains Mono', monospace;
    transition: all 0.2s;
  }
  .quick-tickers button:hover { border-color: var(--blue); color: var(--blue); }
</style>
</head>
<body>

<header>
  <h1>📈 StockSense AI</h1>
  <span>LSTM + ARIMA Hybrid | by Bhavana Suryan</span>
</header>

<div class="container">

  <!-- Quick Tickers -->
  <div style="margin-bottom:16px;">
    <span style="color:var(--muted);font-size:0.8rem;margin-right:8px;">Quick:</span>
    <span class="quick-tickers">
      <button onclick="setTicker('AAPL')">AAPL</button>
      <button onclick="setTicker('GOOGL')">GOOGL</button>
      <button onclick="setTicker('MSFT')">MSFT</button>
      <button onclick="setTicker('TSLA')">TSLA</button>
      <button onclick="setTicker('AMZN')">AMZN</button>
      <button onclick="setTicker('RELIANCE.NS')">RELIANCE</button>
      <button onclick="setTicker('TCS.NS')">TCS</button>
    </span>
  </div>

  <!-- Search Bar -->
  <div class="search-bar">
    <input id="tickerInput" type="text" placeholder="Enter ticker (e.g. AAPL)" value="AAPL" />
    <select id="modelSelect">
      <option value="arima">ARIMA</option>
      <option value="lstm">LSTM</option>
    </select>
    <button onclick="runPrediction()">Predict →</button>
  </div>

  <!-- Metrics -->
  <div class="metrics" id="metricsRow" style="display:none">
    <div class="metric-card"><div class="value" id="m-price">—</div><div class="label">Current Price</div></div>
    <div class="metric-card" id="m-chg-card"><div class="value" id="m-chg">—</div><div class="label">Daily Change</div></div>
    <div class="metric-card"><div class="value" id="m-rmse">—</div><div class="label">RMSE</div></div>
    <div class="metric-card"><div class="value" id="m-mae">—</div><div class="label">MAE</div></div>
    <div class="metric-card"><div class="value" id="m-model">—</div><div class="label">Model</div></div>
  </div>

  <!-- Spinner -->
  <div class="spinner" id="spinner">⏳ Fetching data & running model...</div>

  <!-- Charts -->
  <div id="chartsSection" style="display:none">
    <div class="chart-card">
      <h3>Price Prediction <span class="tag" id="modelTag">ARIMA</span></h3>
      <canvas id="predChart"></canvas>
    </div>
  </div>

</div>

<footer>
  Built by <strong>Bhavana Suryan</strong> · B.Tech CSE 2025 · LSTM + ARIMA Stock Prediction
</footer>

<script>
let predChart = null;

function setTicker(t) {
  document.getElementById('tickerInput').value = t;
}

async function runPrediction() {
  const ticker = document.getElementById('tickerInput').value.trim().toUpperCase();
  const model = document.getElementById('modelSelect').value;
  if (!ticker) return;

  document.getElementById('spinner').classList.add('active');
  document.getElementById('chartsSection').style.display = 'none';
  document.getElementById('metricsRow').style.display = 'none';

  try {
    const res = await fetch('/predict', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ticker, model })
    });
    const data = await res.json();
    if (data.error) { alert('Error: ' + data.error); return; }

    renderMetrics(data);
    renderChart(data, model);

  } catch (e) {
    alert('Request failed: ' + e.message);
  } finally {
    document.getElementById('spinner').classList.remove('active');
  }
}

function renderMetrics(data) {
  document.getElementById('m-price').textContent = '$' + data.last_price;
  const chg = data.price_change;
  document.getElementById('m-chg').textContent = (chg >= 0 ? '+' : '') + chg + '%';
  document.getElementById('m-chg-card').className = 'metric-card ' + (chg >= 0 ? 'up' : 'down');
  document.getElementById('m-rmse').textContent = data.rmse;
  document.getElementById('m-mae').textContent = data.mae;
  document.getElementById('m-model').textContent = data.model;
  document.getElementById('modelTag').textContent = data.model;
  document.getElementById('metricsRow').style.display = 'grid';
}

function renderChart(data, model) {
  if (predChart) predChart.destroy();

  const ctx = document.getElementById('predChart').getContext('2d');

  let datasets = [];
  let labels = [];

  if (model === 'arima') {
    labels = data.index;
    const n = data.actual.length;
    const fitLen = Math.min(n, data.fitted.length);
    datasets = [
      {
        label: 'Actual', data: data.actual.slice(-fitLen),
        borderColor: '#58a6ff', borderWidth: 1.5, pointRadius: 0, fill: false
      },
      {
        label: 'ARIMA Fitted', data: data.fitted.slice(-fitLen),
        borderColor: '#f0883e', borderWidth: 1, pointRadius: 0, fill: false, borderDash: [4,2]
      }
    ];
    labels = data.index.slice(-fitLen);
  } else {
    labels = data.index;
    datasets = [
      {
        label: 'Actual', data: data.actual,
        borderColor: '#58a6ff', borderWidth: 1.5, pointRadius: 0, fill: false
      },
      {
        label: 'LSTM Predicted', data: data.predictions,
        borderColor: '#f85149', borderWidth: 1.5, pointRadius: 0, fill: false
      }
    ];
  }

  predChart = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: '#8b949e' } }
      },
      scales: {
        x: { ticks: { color: '#8b949e', maxTicksLimit: 10 }, grid: { color: '#21262d' } },
        y: { ticks: { color: '#8b949e' }, grid: { color: '#21262d' } }
      }
    }
  });

  document.getElementById('chartsSection').style.display = 'block';
}

// Auto-run on load
window.onload = () => runPrediction();
</script>
</body>
</html>
